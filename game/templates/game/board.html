{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkora | AI Chess</title>
    <link rel="icon" type="image/jpeg" href="{% static 'game/favicon.jpeg' %}">

    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

    <link rel="stylesheet" href="{% static 'game/css/board.css' %}">

    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script>
        (function () {
            const VALID_THEMES = ['classic', 'dark', 'green', 'blue'];
            let saved = 'classic';
            try { saved = localStorage.getItem('chessBoardTheme') || 'classic'; } catch (e) { }
            if (!VALID_THEMES.includes(saved)) saved = 'classic';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body>

<!-- ================= WELCOME OVERLAY ================= -->
<div class="promo-overlay active" id="welcomeOverlay" style="background: var(--page-bg); z-index: 9999;">
    <div class="promo-dialog" style="min-width: 320px; padding: 35px;">
        <div class="promo-title" style="font-size: 1.6rem; margin-bottom: 10px;">Checkora</div>

        <p style="color:#aaa; margin-bottom: 25px;">Enter names and select a mode</p>

        <div id="nameInputs" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">
            <input id="whiteNameInput" placeholder="White Player Name">
            <input id="blackNameInput" placeholder="Black Player Name">
        </div>

        <div id="modeSelection" style="display:flex; flex-direction:column; gap:12px;">
            <button id="welcomePvPBtn" class="btn btn-gold">Pass & Play (PvP)</button>
            <button id="welcomeAIBtn" class="btn btn-gold">Play vs AI</button>
        </div>
    </div>
</div>

<!-- ================= HEADER ================= -->
<div class="header">
    <h1>
        Checkora <span class="badge" id="modeBadge">PVP</span>
    </h1>
</div>

<!-- ================= GAME LAYOUT ================= -->
<div class="game-layout" style="visibility:hidden;">

    <div class="panel">
        <div class="card">
            <div class="card-title">Captured by <span id="whiteCapturedName">White</span></div>
            <div id="whiteCaptured"></div>
        </div>

        <div class="card">
            <div class="card-title">Captured by <span id="blackCapturedName">Black</span></div>
            <div id="blackCaptured"></div>
        </div>
    </div>

    <div class="board-container">

        <div class="turn-badge white" id="turnBadge"></div>

        <div class="clocks">
            <div id="whiteClock">
                <span id="whiteNameLabel">WHITE</span>
                <span id="whiteTime">10:00</span>
            </div>

            <div id="blackClock">
                <span id="blackNameLabel">BLACK</span>
                <span id="blackTime">10:00</span>
            </div>
        </div>

        <div id="board" class="chessboard"></div>

        <div class="status-bar" id="statusBar"></div>
    </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>
(() => {
'use strict';

/* ================= STATE ================= */
let board = [];
let turn = 'white';
let gameMode = 'pvp';
let playerColor = 'white';

let whiteName = 'White';
let blackName = 'Black';

/* ================= HELPERS ================= */
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : '';

/* ================= TURN FIX (IMPORTANT FIX HERE) ================= */
function updateTurn() {
    const badge = document.getElementById('turnBadge');

    const whiteLabel = document.getElementById('whiteNameLabel')?.textContent || 'White';
    const blackLabel = document.getElementById('blackNameLabel')?.textContent || 'Black';

    badge.className = 'turn-badge ' + turn;

    let text;

    if (gameMode === 'ai') {
        text = (turn === playerColor) ? 'Your Turn' : 'AI is thinking...';
    } else {
        text = (turn === 'white' ? whiteLabel : blackLabel) + "'s Turn";
    }

    badge.textContent = text;
}

/* ================= START GAME ================= */
async function startNewGame(mode) {

    whiteName = document.getElementById('whiteNameInput').value.trim() || 'White';
    blackName = document.getElementById('blackNameInput').value.trim() || 'Black';

    const res = await fetch('/api/new-game/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            mode,
            white_name: whiteName,
            black_name: blackName
        })
    });

    const data = await res.json();

    board = data.board;
    turn = data.current_turn;
    gameMode = mode;

    document.getElementById('whiteNameLabel').textContent = whiteName.toUpperCase();
    document.getElementById('blackNameLabel').textContent = blackName.toUpperCase();

    document.getElementById('whiteCapturedName').textContent = cap(whiteName);
    document.getElementById('blackCapturedName').textContent = cap(blackName);

    document.querySelector('.game-layout').style.visibility = 'visible';
    document.getElementById('welcomeOverlay').classList.remove('active');

    updateTurn();
}

/* ================= EVENTS ================= */
document.getElementById('welcomePvPBtn').onclick = () => startNewGame('pvp');
document.getElementById('welcomeAIBtn').onclick = () => startNewGame('ai');

})();
</script>

</body>
</html>
